false_positive_rules:
  - id: technical_stress_testing
    description: 工程压测不是心理压力。
    patterns: ['\bstress[- ]test(?:ing)?\b']
    unless_terms: [mental health, psychological stress, PTSD, depression, anxiety]
    max_domain_score: 2
  - id: llm_hallucination_only
    description: LLM 幻觉不等于精神症状。
    patterns: ['\bhallucinations?\b']
    unless_terms: [auditory hallucination, visual hallucination, psychosis, schizophrenia, psychiatric, mental health]
    max_domain_score: 2
  - id: emotion_or_sentiment_only
    description: 只做情感/情绪识别且无心理健康结局。
    patterns: ['\bsentiment analysis\b', '\bemotion recognition\b', '\baffective computing\b']
    unless_terms: [mental health, depression, anxiety, psychiatric, suicide, therapy, psychological distress]
    max_domain_score: 2
  - id: physical_therapy_only
    description: 物理/职业/言语治疗的 therapy 字面命中。
    patterns: ['\bphysical therapy\b', '\boccupational therapy\b', '\bspeech therapy\b']
    unless_terms: [mental health, psychotherapy, psychiatric, depression, anxiety]
    max_domain_score: 2
  - id: pure_neuro_biomarker
    description: 纯神经影像/生物标志物建模，无服务、评估或心理健康结局。
    patterns: ['\b(?:fMRI|EEG|neuroimaging|biomarker|connectome)\b']
    unless_terms: [screening, assessment, intervention, treatment outcome, clinical workflow, mental health service]
    max_domain_score: 2

